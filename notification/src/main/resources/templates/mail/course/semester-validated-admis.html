<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Résultats du semestre</title>
    <style>
        body{font-family:'Segoe UI',Arial,sans-serif;background:#f3f4f6;}
        .wrapper{max-width:600px;margin:40px auto;background:white;border-radius:10px;overflow:hidden;box-shadow:0 4px 6px rgba(0,0,0,.07);}
        .header{background:linear-gradient(135deg,#065f46,#10b981);padding:35px 40px;text-align:center;}
        .header h1{color:white;font-size:26px;margin:0;}
        .header p{color:#a7f3d0;font-size:13px;margin-top:5px;}
        .body{padding:40px;color:#374151;line-height:1.7;}
        .success{background:#f0fdf4;border-left:4px solid #22c55e;padding:16px 20px;border-radius:4px;margin:20px 0;}
        .result-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:24px;margin:20px 0;text-align:center;}
        .result-card .avg{font-size:48px;font-weight:800;color:#1e40af;line-height:1;}
        .result-card .mention{font-size:18px;color:#059669;font-weight:600;margin-top:8px;}
        .result-card .rank{font-size:13px;color:#6b7280;margin-top:4px;}
        .footer{background:#f9fafb;padding:25px;text-align:center;color:#9ca3af;font-size:12px;border-top:1px solid #e5e7eb;}
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <h1>🎓 Résultats du semestre</h1>
        <p th:text="${semesterLabel}">Semestre</p>
    </div>
    <div class="body">
        <p>Félicitations <strong th:text="${firstName}">Étudiant</strong> !</p>
        <div class="success">
            <strong>✅ Semestre validé - ADMIS(E)</strong>
        </div>
        <div class="result-card">
            <div class="avg" th:text="${average} + '/20'">14.50/20</div>
            <div class="mention" th:text="${mention}">BIEN</div>
            <div class="rank">Rang : <span th:text="${rank}">1</span> •
                Crédits : <span th:text="${credits}">30</span></div>
        </div>
        <p>Votre bulletin de notes est disponible dans votre espace étudiant.</p>
        <p>Cordialement,<br/><strong>La Direction Académique</strong></p>
    </div>
    <div class="footer">
        <p th:with="currentYear=${#dates.year(#dates.createNow())}">
            © <span th:text="${currentYear}">2026</span> AdmissionSchool - Tous droits réservés
        </p>
    </div>
</div>
</body>
</html>
